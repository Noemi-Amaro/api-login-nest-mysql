<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área Protegida</title>
    <style>
    textarea {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  margin-top: 16px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  resize: vertical;
}
 
.perfil-info {
  margin-top: 24px;
  padding: 16px;
  background: #f9fafb;
  border: 1px solid #ddd;
  border-radius: 8px;
}
 
.perfil-info h2 {
  font-size: 18px;
  margin-top: 0;
  color: #2563eb;
}
 
.perfil-info p {
  margin: 8px 0;
  word-break: break-all;
}
</style>

</head>
<body id=" paginaPerfil">
    <div class = "container">
        <div class="card">
            <h1> Área Protegida</h1>
            <p> Cole abaixo o token JWT gerado no login</p>
            <textarea id="campoToken" placeholder="Cole aqui seu Token"></textarea>
            <button id="botaoValidar"> Validar acesso</button>
            <p id="mensagemPerfil" class="mensagem"></p>

            <div id="dadosUsuario" class="perfil-info" style="display: none;">
                <h2> Usuário autenticado</h2>
                <p> <strong> ID:</strong> <span id="idUsuario"></span></p>
                <p> <strong> E-mail:</strong> <span id="emailUsuario"></span></p>
            </div>
            <a href="login.html"> Voltar ao login</a>

        </div>
    </div>
</body>

</html>
